### Copy mode navigation ###
setw -g mode-keys vi
set -g mouse on

# --- MOUSE BINDING ---
# Stay in copy mode after dragging and releasing the mouse
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"

# --- KEYBOARD VI-MODE BINDINGS ---
# Remap 'Enter' to copy to clipboard but STAY in copy mode
bind-key -T copy-mode-vi Enter send -X copy-pipe-no-clear "pbcopy"

# Remap 'y' (the standard vi yank key) to also copy and STAY in copy mode
bind-key -T copy-mode-vi y send -X copy-pipe-no-clear "pbcopy"

### Lazygit popup ###
bind -r g popup -d '#{pane_current_path}' -E -w 90% -h 90% lazygit

### Pane styling ###
# Dim inactive panes
set -g window-style "bg=default"
set -g window-active-style "bg=colour232"
